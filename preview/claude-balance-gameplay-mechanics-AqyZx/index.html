<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SECTOR DEFENSE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  #gameContainer {
    position: relative;
    margin: 0 auto;
    overflow: hidden;
    background: #0a0a12;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #startScreen, #gameOverScreen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5, 5, 15, 0.95);
    z-index: 10;
    transition: opacity 0.5s;
  }

  #gameOverScreen { display: none; }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: #ff3a3a;
    text-transform: uppercase;
    letter-spacing: 6px;
    text-shadow: 0 0 30px rgba(255, 58, 58, 0.6), 0 0 60px rgba(255, 58, 58, 0.3);
    margin-bottom: 10px;
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #667;
    letter-spacing: 4px;
    margin-bottom: 40px;
  }

  .instructions {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #99a;
    text-align: center;
    line-height: 2;
    margin-bottom: 40px;
    max-width: 280px;
  }

  .instructions span { color: #ff6a4a; }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    background: transparent;
    border: 2px solid #ff3a3a;
    padding: 14px 40px;
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn:hover, .btn:active {
    background: #ff3a3a;
    box-shadow: 0 0 30px rgba(255, 58, 58, 0.5);
  }

  .score-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 48px;
    color: #ff3a3a;
    margin: 20px 0;
    text-shadow: 0 0 30px rgba(255, 58, 58, 0.5);
  }

  .final-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #667;
    letter-spacing: 4px;
    margin-bottom: 5px;
  }

  .stats {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #88a;
    margin-bottom: 30px;
  }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  
  <div id="startScreen">
    <div class="title">SECTOR</div>
    <div class="title" style="color:#fff; text-shadow: 0 0 30px rgba(255,255,255,0.3);">DEFENSE</div>
    <div class="subtitle">LAST LINE OF DEFENSE</div>
    <div class="subtitle" style="font-size:10px; color:#889; margin-bottom:20px; letter-spacing:3px;">v0.4.4</div>
    <div style="margin-bottom:20px; display:flex; align-items:center; gap:8px;">
      <label for="waveInput" style="font-family:'Share Tech Mono',monospace; font-size:10px; color:#667; letter-spacing:2px;">START WAVE</label>
      <input type="number" id="waveInput" min="0" max="99" value="0" style="
        width:50px; padding:6px 4px; text-align:center;
        font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700;
        color:#ff3a3a; background:rgba(20,20,40,0.8);
        border:1px solid rgba(255,58,58,0.4); border-radius:2px;
        outline:none; -moz-appearance:textfield;
      ">
    </div>
    <button class="btn" id="startBtn">ENGAGE</button>
  </div>

  <div id="gameOverScreen">
    <div class="title" style="font-size:22px;">BREACH</div>
    <div class="subtitle">DEFENSE COMPROMISED</div>
    <div class="final-label">SCORE</div>
    <div class="score-display" id="finalScore">0</div>
    <div class="stats" id="finalStats"></div>
    <button class="btn" id="restartBtn">RETRY</button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/audio.js"></script>
<script src="js/state.js"></script>
<script src="js/waves.js"></script>
<script src="js/input.js"></script>
<script src="js/update.js"></script>
<script src="js/renderer.js"></script>
<script src="js/main.js"></script>
</body>
</html>
